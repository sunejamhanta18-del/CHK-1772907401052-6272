    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    repositories {
        google()
        mavenCentral()
        maven { url 'https://jitpack.io' } // This is what unlocks MPAndroidChart
    }
}

rootProject.name = "AgriPulse"
include ':app'